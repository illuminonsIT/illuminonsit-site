<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ILLUMINONS IT</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#020617;color:#fff;overflow-x:hidden}
a{text-decoration:none;color:inherit}

.navbar{
position:fixed;top:0;width:100%;z-index:1000;
background:rgba(2,6,23,.9);
backdrop-filter:blur(14px);
transition:.3s;
}

.nav-content{
max-width:1200px;margin:auto;
padding:14px 24px;
display:flex;justify-content:space-between;align-items:center;
}

.logo-navbar{width:60px;border-radius:14px}

.menu{display:flex;gap:24px;color:#cbd5e1}

.hero{
min-height:100vh;
padding:140px 24px 70px;
background:
radial-gradient(circle at 68% 38%,rgba(0,120,255,.36),transparent 34%),
linear-gradient(135deg,#020617,#0f172a 60%,#020617)
}

.hero-content{
max-width:1200px;
margin:auto;
display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
align-items:center;
}

h1{
font-size:64px;
line-height:1.05;
margin-bottom:20px;
}

.gradient{
background:linear-gradient(90deg,#22c55e,#38bdf8);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero p{
color:#cbd5e1;
margin-bottom:25px;
}

.btn{
padding:14px 22px;
border-radius:12px;
font-weight:bold;
margin-right:10px;
}

.btn-primary{background:#22c55e}
.btn-outline{border:1px solid #38bdf8;color:#38bdf8}

.stats{margin-top:20px;display:flex;gap:10px;flex-wrap:wrap}
.stat{padding:10px 14px;background:#0f172a;border-radius:12px}

/* ===== LAURA ===== */

.laura-area{
position:relative;
display:flex;
justify-content:flex-end;
align-items:flex-end;
}

.laura-area::before{
content:"";
position:absolute;
right:60px;
top:80px;
width:520px;
height:520px;
background:radial-gradient(circle,rgba(56,189,248,.32),transparent 70%);
filter:blur(60px);
z-index:0;
}

.laura-img{
height:760px;
position:relative;
z-index:2;
transform:translateX(55px);
animation:float 6s infinite ease-in-out;
}

@keyframes float{
0%,100%{transform:translateX(55px) translateY(0)}
50%{transform:translateX(55px) translateY(-10px)}
}

.speech{
position:absolute;
right:330px;
top:190px;
max-width:320px;
background:#0f172a;
padding:18px;
border-radius:20px;
border:1px solid rgba(56,189,248,.4);
}

.speech strong{color:#38bdf8}

.speech::after{
content:"";
position:absolute;
right:-10px;
top:50%;
border:10px solid transparent;
border-left-color:#0f172a;
}

/* ===== CHAT ===== */

.chat{
position:fixed;
bottom:20px;
right:20px;
width:280px;
background:#fff;
color:#000;
border-radius:20px;
overflow:hidden;
}

.chat-header{
background:#0f172a;
color:#fff;
padding:10px;
display:flex;
justify-content:space-between;
}

.chat-body{
padding:10px;
}

.chat-btn{
display:block;
text-align:center;
border:1px solid #2563eb;
padding:8px;
margin-top:8px;
border-radius:20px;
color:#2563eb;
}

/* ===== MOBILE ===== */

@media(max-width:850px){
.hero-content{grid-template-columns:1fr}
.laura-img{height:420px;transform:none}
.speech{position:relative;right:auto;top:auto}
}
</style>
</head>

<body>

<nav class="navbar">
<div class="nav-content">
<img src="logo.png" class="logo-navbar">
<div class="menu">
<a>Serviços</a>
<a>Pacotes</a>
<a>Contato</a>
</div>
</div>
</nav>

<section class="hero">
<div class="hero-content">

<div>
<h1>
Atraia clientes,<br>
automatize processos e<br>
<span class="gradient">escale seu negócio</span>
</h1>

<p>Unimos tráfego pago, chatbots e automações.</p>

<a class="btn btn-primary">Fazer orçamento</a>
<a class="btn btn-outline">Ver pacotes</a>

<div class="stats">
<div class="stat">Leads qualificados</div>
<div class="stat">Automação</div>
<div class="stat">Escala</div>
</div>
</div>

<div class="laura-area">
<div class="speech" id="speech">
Olá! Eu sou a <br><strong>Laura 👋</strong><br>
Como posso ajudar?
</div>
<img src="laura.png" class="laura-img">
</div>

</div>
</section>

<div class="chat" id="chat">
<div class="chat-header">
<span>Laura</span>
<button onclick="toggleChat()">−</button>
</div>

<div class="chat-body">
<p>Olá! Sou a Laura.</p>
<a class="chat-btn">Orçamento</a>
<a class="chat-btn">Serviços</a>
</div>
</div>

<script>

// navbar hide
let lastScroll=0
const nav=document.querySelector('.navbar')
window.addEventListener('scroll',()=>{
let s=window.scrollY
nav.style.transform=s>lastScroll?"translateY(-100%)":"translateY(0)"
lastScroll=s
})

// mensagens
const msgs=[
"Como posso ajudar?",
"Quer mais clientes?",
"Vamos escalar seu negócio 🚀"
]

let i=0
setInterval(()=>{
i=(i+1)%msgs.length
document.getElementById("speech").innerHTML=
"Olá! Eu sou a <br><strong>Laura 👋</strong><br>"+msgs[i]
},4000)

// chat
function toggleChat(){
const c=document.getElementById("chat")
c.style.display=c.style.display=="none"?"block":"none"
}

</script>

</body>
</html>
