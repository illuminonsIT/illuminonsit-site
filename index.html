<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ILLUMINONS IT</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#020617;color:#fff;overflow-x:hidden}
a{text-decoration:none;color:inherit}

.navbar{
position:fixed;top:0;width:100%;z-index:1000;
background:rgba(2,6,23,.92);
backdrop-filter:blur(14px);
transition:.3s;
}
.nav-content{
max-width:1200px;margin:auto;
padding:14px 24px;
display:flex;justify-content:space-between;align-items:center;
}
.logo-navbar{width:70px;border-radius:16px}
.menu{display:flex;gap:28px;color:#cbd5e1;font-weight:600}

.hero{
min-height:100vh;
padding:150px 24px 70px;
background:
radial-gradient(circle at 70% 38%,rgba(0,120,255,.32),transparent 34%),
linear-gradient(135deg,#020617,#0f172a 60%,#020617)
}

.hero-content{
max-width:1200px;
margin:auto;
display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
align-items:center;
transform:translateX(-30px);
}

h1{
font-size:64px;
line-height:1.05;
margin-bottom:20px;
}

.gradient{
background:linear-gradient(90deg,#22c55e,#38bdf8);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero p{color:#cbd5e1;margin-bottom:25px}

.btn{
padding:14px 22px;
border-radius:12px;
font-weight:bold;
margin-right:10px;
}

.btn-primary{background:#22c55e}
.btn-outline{border:1px solid #38bdf8;color:#38bdf8}

.stats{margin-top:20px;display:flex;gap:10px;flex-wrap:wrap}
.stat{padding:10px 14px;background:#0f172a;border-radius:12px}

.laura-area{
position:relative;
display:flex;
justify-content:flex-end;
align-items:flex-end;
}

.laura-area::before{
content:"";
position:absolute;
right:30px;
top:60px;
width:560px;
height:560px;
background:radial-gradient(circle,rgba(56,189,248,.34),transparent 68%);
filter:blur(70px);
animation:glowPulse 5s ease-in-out infinite;
}

@keyframes glowPulse{
0%,100%{opacity:.7;transform:scale(1)}
50%{opacity:1;transform:scale(1.08)}
}

.laura-img{
height:700px;
position:relative;
z-index:2;
transform:translateX(20px);
animation:lauraFloat 6s ease-in-out infinite;
}

@keyframes lauraFloat{
0%,100%{transform:translateX(20px) translateY(0)}
50%{transform:translateX(20px) translateY(-10px)}
}

.speech{
position:absolute;
right:380px;
top:300px;
max-width:340px;
background:rgba(15,23,42,.96);
padding:20px 24px;
border-radius:20px;
border:1px solid rgba(56,189,248,.4);
animation:speechFloat 5s ease-in-out infinite;
}

@keyframes speechFloat{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-6px)}
}

.speech strong{color:#38bdf8}

.speech::after{
content:"";
position:absolute;
right:-12px;
top:62%;
transform:translateY(-50%);
border:12px solid transparent;
border-left-color:#0f172a;
}

.chat{
position:fixed;
bottom:20px;
right:20px;
width:300px;
background:#fff;
color:#000;
border-radius:20px;
overflow:hidden;
box-shadow:0 25px 90px rgba(0,0,0,.45);
}

.chat-header{
background:#0f172a;
color:#fff;
padding:10px;
display:flex;
justify-content:space-between;
}

.chat-body{padding:10px}

.chat-btn{
display:block;
text-align:center;
border:1px solid #2563eb;
padding:8px;
margin-top:8px;
border-radius:20px;
color:#2563eb;
}

.chat-btn:hover{
background:#2563eb;
color:#fff;
}

.chat-bubble{
position:fixed;
bottom:20px;
right:20px;
width:70px;
height:70px;
border-radius:50%;
background:#0f172a;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
animation:pulseBubble 2.2s infinite;
}

.chat-bubble img{
width:60px;
height:60px;
border-radius:50%;
border:2px solid #22c55e;
}

@keyframes pulseBubble{
0%{box-shadow:0 0 0 0 rgba(34,197,94,.45)}
70%{box-shadow:0 0 0 18px rgba(34,197,94,0)}
100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}
}

@media(max-width:850px){
.hero-content{grid-template-columns:1fr;transform:none}
.laura-img{height:420px}
.speech{position:relative;right:auto;top:auto;margin-top:10px}
}
</style>
</head>

<body>

<nav class="navbar">
<div class="nav-content">
<img src="logo.png" class="logo-navbar">
<div class="menu">
<a>Serviços</a>
<a>Pacotes</a>
<a>Contato</a>
</div>
</div>
</nav>

<section class="hero">
<div class="hero-content">

<div>
<h1>
Atraia clientes,<br>
automatize processos e<br>
<span class="gradient">escale seu negócio</span>
</h1>

<p>Unimos tráfego pago, chatbots e automações.</p>

<a class="btn btn-primary">Fazer orçamento</a>
<a class="btn btn-outline">Ver pacotes</a>

<div class="stats">
<div class="stat">Leads qualificados</div>
<div class="stat">Automação</div>
<div class="stat">Escala</div>
</div>
</div>

<div class="laura-area">
<div class="speech" id="speech">
Olá! Eu sou a <br><strong>Laura 👋</strong><br>
Como posso ajudar?
</div>
<img src="laura.png" class="laura-img">
</div>

</div>
</section>

<div class="chat" id="chat">
<div class="chat-header">
<span>Laura</span>
<button onclick="toggleChat()">−</button>
</div>

<div class="chat-body">
<p>Olá! Sou a Laura.</p>
<a class="chat-btn">Orçamento</a>
<a class="chat-btn">Serviços</a>
</div>
</div>

<div class="chat-bubble" onclick="toggleChat()">
<img src="laura-avatar.png">
</div>

<script>
let lastScroll=0
const nav=document.querySelector('.navbar')
window.addEventListener('scroll',()=>{
let s=window.scrollY
nav.style.transform=s>lastScroll?"translateY(-100%)":"translateY(0)"
lastScroll=s
})

const frases=[
"Como posso ajudar?",
"Quer mais clientes?",
"Vamos escalar seu negócio 🚀",
"Automação aumenta seu faturamento"
]

let i=0
setInterval(()=>{
i=(i+1)%frases.length
document.getElementById("speech").innerHTML=
"Olá! Eu sou a <br><strong>Laura 👋</strong><br>"+frases[i]
},4000)

function toggleChat(){
const c=document.getElementById("chat")
c.style.display=c.style.display=="none"?"block":"none"
}
</script>

</body>
</html>
