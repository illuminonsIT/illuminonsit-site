<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ILLUMINONS IT</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#020617;color:#fff}
a{text-decoration:none}

/* NAV */
.navbar{
position:fixed;width:100%;top:0;
background:#020617d9;padding:15px 30px;
display:flex;justify-content:space-between;align-items:center;
z-index:1000;border-bottom:1px solid #ffffff10
}
.logo-navbar{
width:60px;height:60px;border-radius:12px;
box-shadow:0 0 25px #38bdf8
}
.brand{display:flex;align-items:center;gap:10px;font-weight:bold}
.menu{display:flex;gap:20px}
.menu a{color:#ccc}
.menu a:hover{color:#38bdf8}

/* HERO */
.hero{
height:100vh;display:flex;align-items:center;
padding:120px 40px;
background:linear-gradient(135deg,#020617,#0f172a,#111827)
}
.hero h1{font-size:50px}
.gradient{
color:#22c55e
}
.btn{
padding:12px 20px;border-radius:8px;
cursor:pointer;font-weight:bold;margin-top:15px
}
.btn-primary{background:#22c55e}
.btn-outline{border:1px solid #38bdf8;color:#38bdf8}

/* POPUP */
.popup{
position:fixed;top:0;left:0;width:100%;height:100%;
background:#000000c9;
display:none;justify-content:center;align-items:center;
z-index:2000
}
.popup-box{
background:#0f172a;padding:30px;border-radius:15px;
width:90%;max-width:400px
}
.input{
width:100%;padding:12px;margin-top:10px;
border-radius:8px;border:1px solid #ffffff20;
background:#020617;color:#fff
}

/* WHATS FLOAT */
.whatsapp{
position:fixed;bottom:20px;right:20px;
background:#22c55e;padding:15px;border-radius:50%;
font-weight:bold
}
</style>
</head>

<body>

<!-- NAV -->
<div class="navbar">
  <div class="brand">
    <img src="logo.jpeg" class="logo-navbar">
    <span>ILLUMINONS IT</span>
  </div>

  <div class="menu">
    <a href="#">Serviços</a>
    <a href="#">Contato</a>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <div>
    <h1>
      Transforme processos em 
      <span class="gradient">automações inteligentes</span>
    </h1>

    <p>Chatbots, integrações e automação com n8n.</p>

    <div>
      <button class="btn btn-primary" onclick="abrirPopup()">
        Solicitar proposta
      </button>
    </div>
  </div>
</div>

<!-- POPUP FORM -->
<div class="popup" id="popup">

  <div class="popup-box">

    <h2>Solicitar proposta</h2>

    <input class="input" id="nome" placeholder="Seu nome">
    <input class="input" id="email" placeholder="Seu e-mail">
    <input class="input" id="telefone" placeholder="WhatsApp">
    <textarea class="input" id="mensagem" placeholder="O que você precisa?"></textarea>

    <button class="btn btn-primary" onclick="enviarWhats()">
      Enviar
    </button>

    <button class="btn btn-outline" onclick="fecharPopup()">
      Fechar
    </button>

  </div>

</div>

<!-- WHATS FLOAT -->
<a class="whatsapp" href="https://wa.me/5519992430009">W</a>

<script>
function abrirPopup(){
  document.getElementById("popup").style.display="flex"
}

function fecharPopup(){
  document.getElementById("popup").style.display="none"
}

function enviarWhats(){

  let nome = document.getElementById("nome").value
  let email = document.getElementById("email").value
  let telefone = document.getElementById("telefone").value
  let mensagem = document.getElementById("mensagem").value

  let texto = `Olá, vim pelo site da Illuminons IT!

Nome: ${nome}
Email: ${email}
Telefone: ${telefone}
Mensagem: ${mensagem}`

  let url = "https://wa.me/5519992430009?text=" + encodeURIComponent(texto)

  window.open(url, "_blank")
}
</script>

</body>
</html>
