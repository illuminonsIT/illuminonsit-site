<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ILLUMINONS IT</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#020617;color:#fff}

.navbar{
position:fixed;top:0;width:100%;
background:#020617d9;padding:15px 30px;
display:flex;justify-content:space-between;align-items:center;
border-bottom:1px solid #ffffff10;z-index:1000
}

.brand{display:flex;align-items:center;gap:10px}
.logo-navbar{width:60px;border-radius:10px}

.menu{display:flex;gap:20px}
.menu a{color:#ccc}

.hero{
height:100vh;display:flex;align-items:center;
padding:120px 40px;
background:linear-gradient(135deg,#020617,#0f172a)
}

.hero h1{font-size:45px}
.gradient{color:#22c55e}

.hero p{margin:20px 0;color:#cbd5e1}

.btn{
padding:12px 20px;border-radius:10px;
font-weight:bold;display:inline-block;margin-right:10px
}

.btn-whatsapp{background:#22c55e}
.btn-outline{border:1px solid #38bdf8;color:#38bdf8}

.laura-container{
position:fixed;
bottom:20px;
left:20px;
z-index:9999;
display:flex;
align-items:flex-end;
gap:10px;
}

.laura-img{
width:140px;
animation:float 3s ease-in-out infinite;
}

.laura-box{
background:#0f172a;
border:1px solid #38bdf8;
padding:12px;
border-radius:12px;
max-width:180px;
font-size:13px;
}

.laura-box a{
display:inline-block;
margin-top:8px;
background:#22c55e;
padding:6px 10px;
border-radius:8px;
color:#fff;
font-size:12px;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-8px)}
100%{transform:translateY(0)}
}
</style>
</head>

<body>

<div class="navbar">
  <div class="brand">
    <img src="logo.jpeg" class="logo-navbar">
    <b>ILLUMINONS IT</b>
  </div>

  <div class="menu">
    <a href="#">Serviços</a>
    <a href="#">Contato</a>
  </div>
</div>

<div class="hero">
  <div>
    <h1>
      Transforme processos em 
      <span class="gradient">automação inteligente</span>
    </h1>

    <p>
      Tráfego pago, chatbot e automações com n8n para gerar clientes automaticamente.
    </p>

    <a class="btn btn-whatsapp" href="https://wa.me/5519992430009" target="_blank">
      WhatsApp
    </a>

    <a class="btn btn-outline" href="mailto:Illuminonsit@icloud.com">
      E-mail
    </a>
  </div>
</div>

<div class="laura-container">
  <img src="laura.png" class="laura-img">

  <div class="laura-box">
    <p>Oi! Eu sou a Laura 👋<br>Quer um orçamento rápido?</p>

    <a href="https://wa.me/5519992430009?text=Olá,%20quero%20um%20orçamento" target="_blank">
      Falar comigo
    </a>
  </div>
</div>

</body>
</html>
