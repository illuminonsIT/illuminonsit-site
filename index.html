<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ILLUMINONS IT</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}
body{background:#020617;color:#fff}

.navbar{
position:fixed;width:100%;top:0;
background:rgba(2,6,23,.9);
padding:16px 24px;
z-index:1000;
}

.hero{
min-height:100vh;
padding:140px 24px;
display:flex;
align-items:center;
justify-content:space-between;
background:linear-gradient(135deg,#020617,#0f172a);
}

.hero h1{font-size:56px}
.gradient{
background:linear-gradient(90deg,#22c55e,#38bdf8);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.btn{
padding:14px 22px;
border-radius:12px;
font-weight:bold;
}

.btn-primary{background:#22c55e}
.btn-outline{border:1px solid #38bdf8;color:#38bdf8}

.laura-img{max-height:520px}

.chat-laura{
position:fixed;
right:24px;
bottom:24px;
width:300px;
background:#fff;
color:#111;
border-radius:20px;
overflow:hidden;
box-shadow:0 20px 60px rgba(0,0,0,.4);
z-index:2000;
}

.chat-head{
background:#0f172a;
color:#fff;
padding:14px;
display:flex;
justify-content:space-between;
align-items:center;
}

.chat-head img{
width:42px;
height:42px;
border-radius:50%;
object-fit:cover;
border:2px solid #22c55e;
}

.chat-minimize{
background:none;
border:none;
color:#fff;
font-size:22px;
cursor:pointer;
}

.chat-body{
padding:15px;
}

.chat-body a{
display:block;
text-align:center;
border:1px solid #2563eb;
padding:10px;
border-radius:20px;
margin-top:10px;
color:#2563eb;
font-weight:bold;
}

.chat-bubble{
display:none;
position:fixed;
right:24px;
bottom:24px;
width:70px;
height:70px;
border-radius:50%;
background:#0f172a;
border:none;
box-shadow:0 20px 60px rgba(0,0,0,.4);
align-items:center;
justify-content:center;
cursor:pointer;
z-index:3000;
}

.chat-bubble img{
width:58px;
height:58px;
border-radius:50%;
object-fit:cover;
border:2px solid #22c55e;
}
</style>
</head>

<body>

<div class="navbar">ILLUMINONS IT</div>

<section class="hero">

<div>
<h1>
Atraia clientes,<br>
automatize processos e<br>
<span class="gradient">escale seu negócio</span>
</h1>

<br>

<a class="btn btn-primary" href="https://wa.me/5519992430009" target="_blank">
Fazer orçamento
</a>

</div>

<div>
<img src="laura.png" class="laura-img">
</div>

</section>

<div class="chat-laura" id="chatBox">

<div class="chat-head">
<div style="display:flex;align-items:center;gap:10px;">
<img src="laura-avatar.png">
<div><strong>Laura</strong><br><small style="color:#22c55e">● Online</small></div>
</div>

<button class="chat-minimize" onclick="minimizeChat()">−</button>
</div>

<div class="chat-body">
<p>Olá! Sou a Laura, posso te ajudar.</p>

<a href="https://wa.me/5519992430009" target="_blank">
Quero um orçamento
</a>

<a href="https://wa.me/5519992430009" target="_blank">
Falar com especialista
</a>
</div>

</div>

<button class="chat-bubble" id="chatBubble" onclick="openChat()">
<img src="laura-avatar.png">
</button>

<script>
function minimizeChat(){
document.getElementById("chatBox").style.display="none";
document.getElementById("chatBubble").style.display="flex";
}

function openChat(){
document.getElementById("chatBox").style.display="block";
document.getElementById("chatBubble").style.display="none";
}
</script>

</body>
</html>
